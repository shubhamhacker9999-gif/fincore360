  <title>FinCore 360 · Ultimate ERP · FY 2025-26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --font: 'Sora', sans-serif;
      --mono: 'JetBrains Mono', monospace;

      /* Core palette */
      --bg:        #04060f;
      --bg2:       #080d1a;
      --surface:   #0d1425;
      --surface2:  #111c30;
      --surface3:  #172038;
      --surface4:  #1e2d4a;

      /* Accent - Electric Cyan */
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0,212,255,0.15);
      --cyan-glow: rgba(0,212,255,0.35);

      /* Accent - Violet */
      --violet:    #7c3aed;
      --violet2:   #a78bfa;

      /* Accent - Emerald */
      --emerald:   #10b981;
      --emerald2:  #34d399;

      /* Status */
      --success:   #10b981;
      --warning:   #f59e0b;
      --danger:    #f43f5e;
      --info:      #06b6d4;

      /* Text */
      --t1: #e8f0ff;
      --t2: #8fa8d0;
      --t3: #4a6080;

      /* Borders */
      --b1: rgba(0,212,255,0.12);
      --b2: rgba(0,212,255,0.25);
      --b3: rgba(0,212,255,0.5);

      --radius: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --glow: 0 0 24px rgba(0,212,255,0.2);
    }

    body.light-mode {
      --bg: #f0f4ff;
      --bg2: #e8eeff;
      --surface: #ffffff;
      --surface2: #f5f7ff;
      --surface3: #eef0ff;
      --surface4: #e4e8ff;
      --t1: #0f1729;
      --t2: #3d5275;
      --t3: #8fa8d0;
      --b1: rgba(99,102,241,0.12);
      --b2: rgba(99,102,241,0.25);
      --shadow: 0 4px 24px rgba(0,0,50,0.08);
    }
    body.light-mode input, body.light-mode select, body.light-mode textarea {
      background: var(--surface3) !important;
      color: var(--t1) !important;
      border-color: var(--b2) !important;
    }
    body.light-mode td { color: var(--t2); }
    body.light-mode th { background: var(--surface3); color: var(--t1); }
    body.light-mode table { color: var(--t1); }
    body.light-mode .feature-card { background: var(--surface); }
    body.light-mode .stat-card { background: var(--surface); }

    /* ===================== BASE ===================== */
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(124,58,237,0.05) 0%, transparent 50%);
    }

    /* ===================== SCROLLBAR ===================== */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.25); border-radius:99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

    /* ===================== LOGIN ===================== */
    #loginScreen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      z-index: 9999;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(124,58,237,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 90% 60%, rgba(16,185,129,0.05) 0%, transparent 50%);
      overflow: hidden;
    }

    /* Animated grid lines */
    #loginScreen::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridScroll 20s linear infinite;
    }
    @keyframes gridScroll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    .login-card {
      position: relative;
      width: 100%; max-width: 460px;
      background: rgba(13,20,37,0.9);
      border: 1px solid var(--b2);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow), 0 0 60px rgba(0,212,255,0.08);
      animation: loginReveal 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes loginReveal {
      from { opacity:0; transform:translateY(40px) scale(0.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    .login-header { text-align: center; margin-bottom: 36px; }

    .login-logo {
      font-size: 52px;
      filter: drop-shadow(0 0 20px rgba(0,212,255,0.5));
      display: block;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--violet2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .login-header p { color: var(--t2); font-size: 13px; letter-spacing: 0.5px; }

    .login-hint {
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,212,255,0.06);
      border: 1px solid var(--b1);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--t2);
    }

    /* ===================== INPUTS ===================== */
    input, select, textarea {
      width: 100%;
      padding: 13px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--b1);
      border-radius: var(--radius);
      color: var(--t1);
      font-family: var(--font);
      font-size: 14px;
      margin-bottom: 14px;
      transition: all 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--cyan);
      background: rgba(0,212,255,0.05);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }
    input::placeholder, textarea::placeholder { color: var(--t3); }
    select option { background: var(--surface); color: var(--t1); }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--t2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* ===================== BUTTONS ===================== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 24px;
      border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 10px;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 0.06; }
    .btn:active { transform: scale(0.98); }

    .btn-primary, .btn:not([class*="btn-"]) {
      background: linear-gradient(135deg, #0066cc, var(--cyan));
      color: #000;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(0,212,255,0.45); transform: translateY(-1px); }

    .btn-success { background: linear-gradient(135deg, #059669, var(--emerald2)); color: #000; box-shadow: 0 4px 16px rgba(16,185,129,0.3); }
    .btn-danger   { background: linear-gradient(135deg, #e11d48, #fb7185); color: white; box-shadow: 0 4px 16px rgba(244,63,94,0.3); }
    .btn-warning  { background: linear-gradient(135deg, #d97706, #fbbf24); color: #000; }
    .btn-secondary { background: var(--surface3); color: var(--t1); border: 1px solid var(--b1); }
    .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }

    .btn-sm {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 10px;
      width: auto;
      margin: 0 4px 4px 0;
      cursor: pointer;
      border: none;
      display: inline-flex; align-items: center; gap: 5px;
      transition: all 0.2s;
    }
    .btn-sm.btn-secondary { background: var(--surface3); color: var(--t2); border: 1px solid var(--b1); }
    .btn-sm.btn-secondary:hover { color: var(--cyan); border-color: var(--cyan); }
    .btn-sm.btn-success { background: rgba(16,185,129,0.15); color: var(--emerald2); border: 1px solid rgba(16,185,129,0.3); }
    .btn-sm.btn-danger  { background: rgba(244,63,94,0.12); color: #fb7185; border: 1px solid rgba(244,63,94,0.25); }
    .btn-sm:hover { transform: translateY(-1px); }

    /* ===================== APP HEADER ===================== */
    .app-header {
      position: sticky; top: 0; z-index: 1000;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px;
      background: rgba(8,13,26,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--b1);
      box-shadow: 0 1px 0 var(--b1), 0 8px 32px rgba(0,0,0,0.4);
    }

    .header-logo {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .header-logo-icon {
      font-size: 22px;
      filter: drop-shadow(0 0 8px rgba(0,212,255,0.6));
    }
    .header-logo-text {
      font-size: 16px; font-weight: 800; letter-spacing: -0.3px;
      background: linear-gradient(90deg, var(--cyan), var(--violet2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(0,212,255,0.08);
      border: 1px solid var(--b1);
      border-radius: 99px;
      font-size: 12px; font-weight: 600; color: var(--cyan);
      letter-spacing: 0.3px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--emerald2);
      box-shadow: 0 0 6px var(--emerald2);
      animation: pulse 2s infinite;
    }

    .theme-toggle {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--b1);
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      color: var(--t1);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: var(--cyan); background: var(--cyan-dim); transform: scale(1.1); }

    /* ===================== NAV TABS ===================== */
    .nav-tabs {
      display: flex; gap: 4px; align-items: center;
      padding: 8px 16px;
      background: rgba(8,13,26,0.6);
      border-bottom: 1px solid var(--b1);
      overflow-x: auto; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }

    .nav-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--t3);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.2s;
    }
    .nav-tab:hover { color: var(--t1); background: rgba(255,255,255,0.04); border-color: var(--b1); }
    .nav-tab.active {
      color: var(--cyan);
      background: rgba(0,212,255,0.08);
      border-color: var(--b2);
      box-shadow: 0 0 12px rgba(0,212,255,0.15);
    }

    /* ===================== APP LAYOUT ===================== */
    .app-content {
      display: flex;
      gap: 0;
      height: calc(100vh - 92px);
    }

    /* ===================== SIDEBAR MENU ===================== */
    .feature-menu {
      width: 260px;
      flex-shrink: 0;
      background: rgba(8,13,26,0.5);
      border-right: 1px solid var(--b1);
      padding: 12px 8px;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--b2) transparent;
      display: flex; flex-direction: column; gap: 2px;
    }

    @media (max-width: 1023px) {
      .app-content { flex-direction: column; height: auto; }
      .feature-menu {
        width: 100%; flex-direction: row;
        border-right: none; border-bottom: 1px solid var(--b1);
        padding: 8px;
        overflow-x: auto; overflow-y: hidden;
        scrollbar-width: none;
        max-height: none;
      }
      .feature-panel { height: calc(100vh - 200px); }
    }

    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--t2);
      font-size: 13px; font-weight: 500;
      white-space: nowrap;
      transition: all 0.18s;
      border: 1px solid transparent;
      position: relative;
    }
    .menu-item:hover {
      color: var(--t1);
      background: rgba(255,255,255,0.04);
      border-color: var(--b1);
    }
    .menu-item.active {
      color: var(--cyan);
      background: rgba(0,212,255,0.08);
      border-color: var(--b2);
      font-weight: 600;
    }
    .menu-item.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 2px; border-radius: 1px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
    .menu-item-icon { font-size: 16px; flex-shrink: 0; }

    /* ===================== FEATURE PANEL ===================== */
    .feature-panel {
      flex: 1; min-width: 0;
      padding: 24px 28px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }
    .fade-in { animation: fadeIn 0.25s ease both; }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ===================== CARDS ===================== */
    .feature-card {
      background: rgba(13,20,37,0.7);
      border: 1px solid var(--b1);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .feature-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent);
    }
    .feature-card:hover { border-color: var(--b2); box-shadow: var(--glow); }

    .feature-card h3 {
      font-size: 15px; font-weight: 700;
      color: var(--t1); margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .feature-card h3::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--b1), transparent);
    }

    /* Page title */
    h2 {
      font-size: 20px; font-weight: 800;
      color: var(--t1); margin-bottom: 24px;
      letter-spacing: -0.3px;
    }
    h2 > span { font-size: 22px; }

    /* ===================== STAT CARDS ===================== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(13,20,37,0.8);
      border: 1px solid var(--b1);
      border-radius: var(--radius-lg);
      padding: 20px;
      position: relative; overflow: hidden;
      transition: all 0.2s;
    }
    .stat-card::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at top right, rgba(0,212,255,0.04), transparent 60%);
      pointer-events: none;
    }
    .stat-card:hover { border-color: var(--b2); transform: translateY(-2px); box-shadow: var(--glow); }

    .stat-card h3 {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--t3);
      margin-bottom: 10px;
    }

    .stat-card .number {
      font-size: 26px; font-weight: 800;
      color: var(--t1);
      font-family: var(--mono);
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-card .trend {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px; font-size: 12px; font-weight: 600;
    }
    .trend.up   { color: var(--emerald2); }
    .trend.down { color: var(--danger); }
    .trend:not(.up):not(.down) { color: var(--t3); }

    .progress-bar {
      height: 4px; background: rgba(255,255,255,0.06);
      border-radius: 99px; overflow: hidden; margin: 10px 0;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--cyan), var(--violet2));
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(0,212,255,0.4);
    }

    /* ===================== TABLES ===================== */
    .table-responsive {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--b1);
      margin: 8px 0 16px;
    }

    table { width: 100%; border-collapse: collapse; min-width: 500px; }

    thead tr {
      background: rgba(0,212,255,0.05);
      border-bottom: 1px solid var(--b2);
    }
    th {
      padding: 12px 16px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--cyan);
      text-align: left;
      white-space: nowrap;
    }
    td {
      padding: 13px 16px;
      font-size: 13px; color: var(--t2);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: all 0.15s;
    }
    tbody tr:hover td { background: rgba(0,212,255,0.03); color: var(--t1); }
    tbody tr:last-child td { border-bottom: none; }

    tfoot tr { background: rgba(0,212,255,0.04); border-top: 1px solid var(--b2); }
    tfoot td { font-weight: 700; color: var(--t1); }

    /* ===================== VOUCHER BADGES ===================== */
    .voucher-type-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.3px;
    }
    .voucher-type-Sales    { background: rgba(16,185,129,0.15); color: var(--emerald2); border:1px solid rgba(16,185,129,0.25); }
    .voucher-type-Purchase { background: rgba(245,158,11,0.12); color: #fbbf24;  border:1px solid rgba(245,158,11,0.25); }
    .voucher-type-Payment  { background: rgba(244,63,94,0.12);  color: #fb7185;  border:1px solid rgba(244,63,94,0.25); }
    .voucher-type-Receipt  { background: rgba(0,212,255,0.1);   color: var(--cyan); border:1px solid var(--b2); }
    .voucher-type-Journal  { background: rgba(124,58,237,0.12); color: var(--violet2); border:1px solid rgba(124,58,237,0.25); }
    .voucher-type-Contra   { background: rgba(236,72,153,0.12); color: #f472b6; border:1px solid rgba(236,72,153,0.25); }
    .voucher-type-DebitNote  { background: rgba(249,115,22,0.12); color: #fb923c; border:1px solid rgba(249,115,22,0.25); }
    .voucher-type-CreditNote { background: rgba(20,184,166,0.12); color: #2dd4bf; border:1px solid rgba(20,184,166,0.25); }

    /* ===================== DAYBOOK ===================== */
    .daybook-filters {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end;
    }
    .daybook-filters input,
    .daybook-filters select { flex:1; min-width:150px; margin-bottom:0; }

    .daybook-summary {
      display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      background: rgba(0,212,255,0.05);
      border: 1px solid var(--b1);
      border-radius: var(--radius);
      padding: 14px 18px; margin: 16px 0;
      font-size: 13px; font-weight: 600;
    }
    .daybook-summary span { color: var(--t2); }

    /* ===================== DASHBOARD ITEMS ===================== */
    .dashboard-item {
      background: rgba(13,20,37,0.8);
      border: 1px solid var(--b1);
      border-radius: var(--radius-lg);
      padding: 20px 14px;
      text-align: center;
      font-weight: 600; font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .dashboard-item::after {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at center, rgba(0,212,255,0.05), transparent 70%);
      opacity: 0; transition: opacity 0.2s;
    }
    .dashboard-item:hover { border-color: var(--cyan); transform: translateY(-3px); box-shadow: var(--glow); }
    .dashboard-item:hover::after { opacity: 1; }
    .dashboard-item .value { font-size: 22px; color: var(--cyan); margin-top: 8px; font-family: var(--mono); }

    /* ===================== QUICK ACTIONS ===================== */
    .quick-actions {
      display: flex; gap: 8px; padding: 4px 0 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .quick-action {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; flex-shrink: 0;
      background: rgba(0,212,255,0.08);
      border: 1px solid var(--b2);
      border-radius: 10px;
      font-size: 13px; font-weight: 600; color: var(--cyan);
      cursor: pointer; transition: all 0.2s;
    }
    .quick-action:hover { background: rgba(0,212,255,0.15); transform: translateY(-2px); }

    /* ===================== NOTIFICATION ===================== */
    .notification-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(244,63,94,0.15);
      border: 1px solid rgba(244,63,94,0.3);
      color: #fb7185;
      padding: 4px 12px; border-radius: 99px;
      font-size: 11px; font-weight: 700;
      animation: pulse 2s infinite;
      cursor: pointer;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50% { opacity: 0.7; }
    }

    /* ===================== FLOATING BUTTON ===================== */
    .floating-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0066cc, var(--cyan));
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(0,212,255,0.4);
      z-index: 500; cursor: pointer;
      transition: all 0.2s;
      color: #000;
    }
    .floating-btn:hover { transform: scale(1.1) rotate(15deg); box-shadow: 0 12px 32px rgba(0,212,255,0.5); }

    /* ===================== MODAL ===================== */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      backdrop-filter: blur(8px);
      padding: 20px;
    }
    .modal-content {
      background: rgba(13,20,37,0.98);
      border: 1px solid var(--b2);
      border-radius: var(--radius-xl);
      padding: 32px;
      max-width: 540px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      box-shadow: var(--shadow), 0 0 40px rgba(0,212,255,0.1);
      animation: fadeIn 0.25s ease;
      position: relative;
    }
    .modal-content::before {
      content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
      width:50%; height:1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }
    .close-btn {
      float: right; font-size: 20px;
      cursor: pointer; color: var(--t3);
      line-height: 1; transition: color 0.2s;
    }
    .close-btn:hover { color: var(--danger); }

    /* ===================== SEARCH BOX ===================== */
    .search-box { position: relative; margin-bottom: 16px; }
    .search-box input { padding-left: 42px; margin-bottom: 0; }
    .search-box::before {
      content: '⌕';
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--t3); font-size: 18px; z-index: 1; pointer-events: none;
    }

    /* ===================== SPINNER ===================== */
    .spinner {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(0,212,255,0.1);
      border-top-color: var(--cyan);
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===================== MISC ===================== */
    .error-message {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      color: #fb7185;
      padding: 16px 20px; border-radius: var(--radius);
      margin: 16px 0; text-align: center;
    }

    .pagination { display: flex; gap: 6px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
    .pagination button {
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid var(--b1);
      background: transparent; color: var(--t2);
      font-family: var(--font); font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .pagination button:hover { border-color: var(--cyan); color: var(--cyan); }
    .pagination button.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

    .tooltip { position: relative; display: inline-block; }
    .tooltip .tooltiptext {
      visibility: hidden; opacity: 0;
      background: var(--surface3); color: var(--t1);
      font-size: 12px; white-space: nowrap;
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--b1);
      position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
      transition: opacity 0.2s; z-index: 99;
      pointer-events: none;
    }
    .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

    /* ===================== GRID HELPERS ===================== */
    .grid-1 { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    @media (max-width: 768px) {
      .grid-2,.grid-3,.grid-4 { grid-template-columns: 1fr; }
      .feature-panel { padding: 16px; }
      .app-header { padding: 8px 12px; gap: 8px; }
    }
    @media (min-width: 1024px) {
      .btn { width: auto; display: inline-flex; margin-right: 8px; }
    }

    /* ===================== PRINT ===================== */
    @media print {
      body * { visibility: hidden; }
      #invoicePrintArea, #invoicePrintArea * { visibility: visible; }
      #invoicePrintArea { position: fixed; left: 0; top: 0; width: 100%; z-index: 99999; }
    }

    /* ===== GALAXY INVOICE (preserved) ===== */
    .invoice-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 20000;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      padding: 20px; overflow-y: auto;
    }
    #invoicePrintArea {
      width: 900px; max-width: 100%;
      background: #fff; border-radius: 24px; overflow: hidden;
      box-shadow: 0 0 60px rgba(100,60,255,0.4), 0 0 120px rgba(255,60,180,0.2);
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .inv-galaxy-bg {
      background: linear-gradient(135deg,#0d0221 0%,#1a0533 30%,#0d1b4b 60%,#0d0221 100%);
      padding:28px 32px 18px; position:relative; overflow:hidden;
    }
    .inv-galaxy-bg::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 15% 50%,rgba(120,60,255,0.35) 0%,transparent 55%),
                  radial-gradient(ellipse at 85% 50%,rgba(255,60,180,0.3) 0%,transparent 55%);
    }
    .inv-header-row { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; }
    .inv-badge { background:linear-gradient(135deg,#6a11cb,#2575fc); border:2px solid rgba(255,255,255,0.3); border-radius:12px; padding:8px 22px; color:#fff; font-size:22px; font-weight:800; letter-spacing:2px; text-shadow:0 0 10px rgba(100,180,255,0.8); box-shadow:0 0 18px rgba(100,100,255,0.5); }
    .inv-company-name { color:#fff; font-size:30px; font-weight:800; text-align:center; flex:1; text-shadow:0 0 12px rgba(200,220,255,0.6); letter-spacing:1px; }
    .inv-date-box { color:#e0e8ff; font-size:15px; font-weight:600; text-align:right; min-width:160px; }
    .inv-address-row { text-align:center; color:#ccd6ff; font-size:14px; margin-top:6px; position:relative; z-index:1; }
    .inv-body { background:#f0f2ff; padding:24px 32px; }
    .inv-to-box { background:rgba(255,255,255,0.7); border-radius:12px; padding:14px 18px; margin-bottom:18px; border-left:4px solid #4f46e5; }
    .inv-to-box strong { font-size:16px; color:#1e1b4b; }
    .inv-to-box p { margin:4px 0 0; color:#374151; font-size:13px; }
    .inv-table { width:100%; border-collapse:collapse; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(80,60,200,0.1); }
    .inv-table thead tr { background:linear-gradient(90deg,#3730a3,#6d28d9,#db2777); color:#fff; }
    .inv-table thead th { padding:12px 10px; font-size:13px; font-weight:700; text-align:center; border:none; color:#fff; }
    .inv-table thead th:nth-child(2) { text-align:left; }
    .inv-table tbody tr { background:#fff; }
    .inv-table tbody tr:nth-child(even) { background:#eef0ff; }
    .inv-table tbody td { padding:11px 10px; font-size:13px; text-align:center; border-bottom:1px solid #e0e3ff; color:#1f2937; }
    .inv-table tbody td:nth-child(2) { text-align:left; font-weight:500; }
    .inv-totals-row { display:flex; justify-content:space-between; align-items:flex-end; margin-top:18px; gap:20px; }
    .inv-words-box { background:#fff; border-radius:10px; padding:12px 16px; flex:1; border:1px solid #c7d2fe; }
    .inv-words-box span { font-size:11px; color:#6b7280; font-weight:600; }
    .inv-words-box p { margin:4px 0 0; font-style:italic; font-size:13px; color:#374151; font-weight:500; }
    .inv-summary { background:#fff; border-radius:10px; padding:12px 18px; min-width:260px; border:1px solid #c7d2fe; }
    .inv-summary-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; color:#374151; border-bottom:1px dashed #e0e3ff; }
    .inv-summary-row:last-child { border-bottom:none; }
    .inv-total-final { display:flex; justify-content:space-between; align-items:center; background:linear-gradient(90deg,#3730a3,#6d28d9); color:#fff; border-radius:10px; padding:12px 18px; margin-top:10px; font-size:16px; font-weight:800; }
    .inv-footer-row { display:flex; justify-content:space-between; align-items:flex-end; margin-top:20px; padding-top:14px; border-top:1px solid #c7d2fe; }
    .inv-footer-left { font-size:12px; color:#6b7280; }
    .inv-sign-box { text-align:right; }
    .inv-sign-box .for-name { font-weight:700; color:#1e1b4b; font-size:15px; }
    .inv-sign-line { border-top:1px solid #374151; width:160px; margin:28px 0 6px auto; }
    .inv-sign-box .auth { font-size:12px; color:#6b7280; }
    .inv-bottom-bar { background:linear-gradient(90deg,#0d0221,#1a0533,#0d1b4b,#1a0533,#0d0221); color:#a5b4fc; text-align:center; padding:10px; font-size:13px; letter-spacing:1px; }
    .inv-modal-actions { display:flex; gap:12px; justify-content:center; padding:16px 0 4px; }
    .inv-print-btn { background:linear-gradient(135deg,#6a11cb,#2575fc); color:white; border:none; padding:12px 32px; border-radius:40px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 15px rgba(100,80,255,0.4); }
    .inv-print-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(100,80,255,0.5); }
    .inv-close-btn { background:#ef4444; color:white; border:none; padding:12px 28px; border-radius:40px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .inv-close-btn:hover { background:#dc2626; transform:translateY(-2px); }

    /* ===== SLIDE ANIMATIONS ===== */
    @keyframes slideIn  { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes slideOut { from{transform:translateX(0);opacity:1} to{transform:translateX(100%);opacity:0} }

    /* ===== FORM IMPROVEMENTS ===== */
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 14px; }
    .form-group { display: flex; flex-direction: column; }

    /* ===== BETTER NOTIFICATIONS ===== */
    .notif-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }

    /* ===== BADGE COLORS ===== */
    .badge-success { background: rgba(16,185,129,0.15); color: var(--emerald2); border: 1px solid rgba(16,185,129,0.3); padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .badge-danger  { background: rgba(244,63,94,0.12); color: #fb7185; border: 1px solid rgba(244,63,94,0.25); padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .badge-warning { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .badge-info    { background: rgba(0,212,255,0.1); color: var(--cyan); border: 1px solid var(--b2); padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }

    /* ===== TABLE IMPROVEMENTS ===== */
    td input[type="number"], td input[type="text"] { margin: 0; padding: 8px 10px; }
    td select { margin: 0; padding: 8px 10px; }

    /* ===== AI CHAT IMPROVEMENTS ===== */
    #aiChatBox::-webkit-scrollbar { width: 4px; }
    #aiChatBox::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px; }

    /* ===== MOBILE FIXES ===== */
    @media (max-width: 600px) {
      .app-header { flex-wrap: wrap; gap: 6px; }
      .header-logo-text { font-size: 13px; }
      .feature-panel { padding: 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .feature-card { padding: 16px; }
      h2 { font-size: 16px; }
      .inv-modal-actions { justify-content: flex-start; }
      .inv-print-btn { padding: 10px 16px; font-size: 13px; }
      table { min-width: 400px; }
    }

    /* ===== ACTIVE NAV HIGHLIGHT ===== */
    .nav-tab.active { font-weight: 700; }
  

    /* ===== PWA INSTALL BANNER ===== */

      function validateGST(gstin) {
        const pattern = /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}[Z]{1}[0-9A-Z]{1}$/;
        return pattern.test(gstin);
      }

      function validatePAN(pan) {
        const pattern = /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;
        return pattern.test(pan);
      }

      function validateEmail(email) {
        const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return pattern.test(email);
      }

      function validatePhone(phone) {
        const pattern = /^[6-9]\d{9}$/;
        return pattern.test(phone);

      // =========================================================================

      window.handleCalculation = function(el, target) {
        let row = el.closest('tr');
        if (!row) return;
        
        let q = parseFloat(row.querySelector('.qty')?.value) || 0;
        let a = parseFloat(row.querySelector('.amt')?.value) || 0;
        let r = parseFloat(row.querySelector('.rate')?.value) || 0;

        if (target === 'rate') {
          // Qty ya Amount diya — Rate nikalo
          if (q > 0 && a > 0) {
            row.querySelector('.rate').value = (a / q).toFixed(2);
          }
        } else if (target === 'amount') {
          // Qty aur Rate diya — Amount nikalo
          if (q > 0 && r > 0) {
            row.querySelector('.amt').value = (q * r).toFixed(2);
          }
        }

        // Update totals based on which table
        if (row.closest('#itemRows')) {
          calculateTotals();
        } else if (row.closest('#purchaseItemRows')) {
          calculatePurchaseTotals();
        }
      };

      window.handleLogin = function() {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        const companyIdx = parseInt(document.getElementById('loginCompany').value) || 0;

        const user = AppData.users.find(u => u.username === username && u.password === password);

        if (!user) {
          showNotification('Invalid credentials! Use admin/admin', 'error');
          return;
        }

        if (user.locked) {
          showNotification('Account is locked. Contact administrator.', 'error');
          return;
        }

        user.lastLogin = new Date().toISOString();
        user.lastIp = '192.168.1.' + Math.floor(Math.random() * 255);
        user.loginAttempts = 0;

        AppData.currentUser = user;
        AppData.currentCompany = companyIdx;

        AppData.auditTrail.push({
          id: 'A' + String(AppData.auditTrail.length + 1).padStart(3, '0'),
          user: username,
          action: 'Login',
          timestamp: new Date().toISOString(),
          ip: user.lastIp,
          details: `Logged into ${AppData.companies[companyIdx].name}`
        });

        saveData();

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';

        initApp();

        showNotification(`Welcome back, ${username}!`, 'success');
      };

                      sum + (v.items?.filter(i => i.itemId === item.id).reduce((s, i) => s + i.qty, 0) || 0), 0);
                    const sales = AppData.vouchers.filter(v => v.type === 'Sales' && v.items?.some(i => i.itemId === item.id)).reduce((sum, v) => 
                      sum + (v.items?.filter(i => i.itemId === item.id).reduce((s, i) => s + i.qty, 0) || 0), 0);
                    const closing = item.openingStock + purchases - sales;
                    const value = closing * item.rate;
                    const status = closing <= item.minStock ? 'Low Stock' : closing >= item.maxStock ? 'Excess' : 'Normal';

                    return `

                        <td>${item.group}</td>

                        <td>${purchases}</td>
                        <td>${sales}</td>
                        <td>${closing}</td>
                        <td>${formatCurrency(value)}</td>
                        <td><span style="color: ${statusColor};">${status}</span></td>

          `<option value="${i.id}" data-rate="${i.rate}" data-gst="${i.gst}">${i.name} - ${formatCurrency(i.rate)}</option>`).join('');

        const newRow = document.createElement('tr');
        newRow.className = 'item-row';
        newRow.innerHTML = `
          <td>
            <select class="itemSelect" style="width: 100%;" onchange="updateItemRow(this)">
              <option value="">Select Item</option>
              ${items}
            </select>
          </td>
          <td><input type="number" class="qty" value="1" min="1" style="width:70px;" oninput="calculatePurchaseRow(this)"></td>
          <td><input type="number" class="rate" value="0" style="width:100px;" oninput="calculatePurchaseRow(this)"></td>
          <td><input type="number" class="amt" value="0" style="width:110px;" oninput="handleCalculation(this,'rate')" placeholder="Amount"></td>
          <td><button class="btn-sm btn-danger" onclick="removeItemRow(this)">✖</button></td>
        `;
        container.appendChild(newRow);
      };

      window.updateItemRow = function(select) {
        const row = select.closest('tr');
        const selected = select.options[select.selectedIndex];
        if (selected && selected.value) {
          const rate = selected.dataset.rate;
          row.querySelector('.rate').value = rate;
          // Also set amount based on qty and rate
          let q = parseFloat(row.querySelector('.qty').value) || 0;
          if (q > 0) {
            row.querySelector('.amt').value = (q * parseFloat(rate)).toFixed(2);
          }
          calculateRow(row.querySelector('.qty'));
        }
      };

      window.calculateRow = function(input) {
        const row = input.closest('tr');
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const rate = parseFloat(row.querySelector('.rate').value) || 0;
        const amount = qty * rate;
        row.querySelector('.amt').value = amount.toFixed(2);

        calculateTotals();
      };

      window.calculateTotals = function() {
        const rows = document.querySelectorAll('#itemRows tr');
        let taxable = 0, cgst = 0, sgst = 0, igst = 0;

        rows.forEach(row => {
          const amount = parseFloat(row.querySelector('.amt').value) || 0;
          taxable += amount;

          const select = row.querySelector('.itemSelect');
          const selected = select?.options[select.selectedIndex];
          const gst = selected && selected.dataset.gst ? parseFloat(selected.dataset.gst) : 18;
          const gstAmount = (amount * gst) / 100;
          cgst += gstAmount / 2;
          sgst += gstAmount / 2;
        });

        document.getElementById('taxableValue').value = formatCurrency(taxable).replace('₹', '');

      window.calculateJournal = function() {
        const rows = document.querySelectorAll('.journal-row');
        let totalDebit = 0, totalCredit = 0;

        rows.forEach(row => {
          totalDebit += parseFloat(row.querySelector('.journalDebit').value) || 0;
          totalCredit += parseFloat(row.querySelector('.journalCredit').value) || 0;
        });

        document.getElementById('totalDebit').value = formatCurrency(totalDebit).replace('₹', '');
        document.getElementById('totalCredit').value = formatCurrency(totalCredit).replace('₹', '');

        const diff = totalDebit - totalCredit;
        const diffDiv = document.getElementById('journalDiff');
        if (Math.abs(diff) > 0.01) {
          diffDiv.innerHTML = `Difference: ${formatCurrency(Math.abs(diff))} - Journal is not balanced!`;
        } else {
          diffDiv.innerHTML = '';
        }
      };

        const amount = parseFloat(document.getElementById('gstAmount')?.value) || 0;

        const type = document.getElementById('gstType')?.value;

        const gstAmount = (amount * rate) / 100;

        if (type === 'intra') {
          document.getElementById('calcCGST').value = formatCurrency(halfGST).replace('₹', '');
          document.getElementById('calcSGST').value = formatCurrency(halfGST).replace('₹', '');
          document.getElementById('calcIGST').value = '0.00';
          document.getElementById('calcTotal').value = formatCurrency(amount + gstAmount).replace('₹', '');
        } else {
          document.getElementById('calcCGST').value = '0.00';
          document.getElementById('calcSGST').value = '0.00';
          document.getElementById('calcIGST').value = formatCurrency(gstAmount).replace('₹', '');
          document.getElementById('calcTotal').value = formatCurrency(amount + gstAmount).replace('₹', '');
        }

      window.loadDayBook = function() {
        const selectedDate = document.getElementById('dayBookDate')?.value;
        if (!selectedDate) return;

        const voucherType = document.getElementById('voucherTypeFilter')?.value || 'all';
        const searchTerm = document.getElementById('dayBookSearch')?.value.toLowerCase() || '';

        let filteredVouchers = AppData.vouchers.filter(v => v.date === selectedDate);

        if (voucherType !== 'all') {
          filteredVouchers = filteredVouchers.filter(v => v.type === voucherType);
        }

        if (searchTerm) {
          filteredVouchers = filteredVouchers.filter(v => 
            v.ref?.toLowerCase().includes(searchTerm) ||
            v.party?.toLowerCase().includes(searchTerm) ||
            v.narration?.toLowerCase().includes(searchTerm) ||
            v.voucherNo?.toLowerCase().includes(searchTerm)
          );
        }

        filteredVouchers.sort((a, b) => (a.voucherNo || '').localeCompare(b.voucherNo || ''));

        let totalDebit = 0, totalCredit = 0;
        filteredVouchers.forEach(v => {
          if (['Payment', 'Purchase', 'Journal', 'Debit Note'].includes(v.type)) {
            totalDebit += v.amount;
          } else if (['Sales', 'Receipt', 'Credit Note'].includes(v.type)) {
            totalCredit += v.amount;
          }
        });

        window.currentDayBookData = {
          selectedDate,
          voucherType,
          searchTerm,
          filteredVouchers,
          totalDebit,
          totalCredit
        };

        renderDayBookResults(filteredVouchers, totalDebit, totalCredit);
      };

      function numberToWords(num) {
        const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
          'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
        const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
        if (num === 0) return 'Zero';
        function helper(n) {
          if (n < 20) return ones[n];
          if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '');
          if (n < 1000) return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + helper(n%100) : '');
          if (n < 100000) return helper(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' ' + helper(n%1000) : '');
          if (n < 10000000) return helper(Math.floor(n/100000)) + ' Lakh' + (n%100000 ? ' ' + helper(n%100000) : '');
          return helper(Math.floor(n/10000000)) + ' Crore' + (n%10000000 ? ' ' + helper(n%10000000) : '');
        }
        const rupees = Math.floor(num);
        const paise = Math.round((num - rupees) * 100);
        let result = 'Rupees ' + helper(rupees);
        if (paise > 0) result += ' and ' + helper(paise) + ' Paise';
        return result + ' Only';
      }

      function renderBackupRestore(panel) {
        panel.innerHTML=`
          <h2 style="margin-bottom:20px; display:flex; align-items:center; gap:10px;"><span>💾</span> Data Backup & Restore</h2>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div class="feature-card">
              <h3>💾 Backup Data</h3>
              <p style="color:var(--text-muted); margin:12px 0;">Export all data as JSON backup file. Store it safely.</p>
              <div style="display:flex; flex-direction:column; gap:10px; margin-top:16px;">
                <button class="btn btn-success" onclick="backupAllData()">💾 Full Backup (JSON)</button>
                <button class="btn btn-secondary" onclick="backupVouchers()">🧾 Vouchers Only</button>
                <button class="btn btn-secondary" onclick="showFeature('pr15')">📤 Export Module</button>
              </div>
            </div>
            <div class="feature-card">
              <h3>🔄 Restore Data</h3>
              <p style="color:var(--text-muted); margin:12px 0;">Restore from a previously saved backup file.</p>
              <div style="margin-top:16px;">
                <input type="file" id="restoreFile" accept=".json" style="margin-bottom:12px;">
                <button class="btn btn-warning" onclick="restoreData()">🔄 Restore from File</button>
              </div>
              <div style="margin-top:12px; padding:10px; background:var(--card-light); border-radius:12px; font-size:13px; color:var(--warning);">
                ⚠️ Restore will overwrite current data. Please backup first!
              </div>
            </div>
          </div>`;
        window.backupAllData=()=>{const data=JSON.stringify(AppData,null,2);const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='tally360_backup_'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(url);showNotification('Full backup downloaded!','success');};
        window.backupVouchers=()=>{const data=JSON.stringify({vouchers:AppData.vouchers,ledgerAccounts:AppData.ledgerAccounts},null,2);const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='vouchers_backup_'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(url);showNotification('Vouchers backup downloaded!','success');};
        window.restoreData=()=>{const file=document.getElementById('restoreFile')?.files[0];if(!file){showNotification('Select a backup file first','error');return;}const reader=new FileReader();reader.onload=(e)=>{try{const data=JSON.parse(e.target.result);if(!confirm('This will overwrite all current data. Are you sure?'))return;Object.assign(AppData,data);saveData();showNotification('Data restored successfully!','success');showFeature('d1');}catch(err){showNotification('Invalid backup file!','error');}};reader.readAsText(file);};
      }

      window.saveQuickItem = function(source) {
        const name = document.getElementById('qiName')?.value?.trim();
        const rate = parseFloat(document.getElementById('qiRate')?.value) || 0;
        if (!name) { showNotification('Item name is required', 'error'); return; }
        if (!rate)  { showNotification('Selling rate is required', 'error'); return; }

        const newItem = {
          id:    'S' + String(AppData.stockItems.length + 1).padStart(3,'0'),
          name,
          group:        document.getElementById('qiGroup')?.value    || 'General',
          unit:         document.getElementById('qiUnit')?.value     || 'Pcs',
          rate,
          purchaseRate: parseFloat(document.getElementById('qiPurchRate')?.value) || 0,
          gst:          parseInt(document.getElementById('qiGST')?.value)          || 18,
          hsn:          document.getElementById('qiHSN')?.value       || '',
          openingStock: parseInt(document.getElementById('qiOpening')?.value)      || 0,
          minStock:     parseInt(document.getElementById('qiMin')?.value)           || 0,
          maxStock:     0,
          reorderLevel: parseInt(document.getElementById('qiReorder')?.value)      || 0,
          reorderQty:   0,
          brand:        document.getElementById('qiBrand')?.value     || '',
          location:     document.getElementById('qiLocation')?.value  || '',
          batch:        'B' + String(AppData.stockItems.length + 1).padStart(3,'0'),
          expiry:       new Date(new Date().setFullYear(new Date().getFullYear()+2)).toISOString().split('T')[0],
          manufacturingDate: new Date().toISOString().split('T')[0],
          createdOn:    new Date().toISOString().split('T')[0],
          modifiedOn:   new Date().toISOString().split('T')[0],
          status:       'Active'
        };

        AppData.stockItems.push(newItem);
        saveData();

        // Close modal
        document.querySelector('.modal')?.remove();

        // Add new option to ALL item dropdowns in the voucher
        const rowsId = source === 'purchase' ? '#purchaseItemRows' : '#itemRows';
        const allSelects = document.querySelectorAll(rowsId + ' .itemSelect');
        allSelects.forEach(sel => {
          const opt = document.createElement('option');
          opt.value        = newItem.id;
          opt.dataset.rate = newItem.rate;
          opt.dataset.gst  = newItem.gst;
          opt.textContent  = newItem.name + ' — ₹' + newItem.rate.toLocaleString('en-IN');
          sel.appendChild(opt);
        });

        // Also add a new row with this item pre-selected
        if (source === 'purchase') {
          addPurchaseItemRow();
          const lastRow = document.querySelector('#purchaseItemRows tr:last-child');
          if (lastRow) {
            const sel = lastRow.querySelector('.itemSelect');
            if (sel) {
              // find and select the new option
              for (let o of sel.options) {
                if (o.value === newItem.id) { sel.value = newItem.id; break; }
              }
              // Add option if not already there
              if (sel.value !== newItem.id) {
                const opt = document.createElement('option');
                opt.value = newItem.id; opt.dataset.rate = newItem.rate; opt.dataset.gst = newItem.gst;
                opt.textContent = newItem.name + ' — ₹' + newItem.rate.toLocaleString('en-IN');
                sel.appendChild(opt); sel.value = newItem.id;
              }
              updatePurchaseItemRow(sel);
            }
          }
        } else {
          addItemRow();
          const lastRow = document.querySelector('#itemRows tr:last-child');
          if (lastRow) {
            const sel = lastRow.querySelector('.itemSelect');
            if (sel) {
              if (sel.value !== newItem.id) {
                const opt = document.createElement('option');
                opt.value = newItem.id; opt.dataset.rate = newItem.rate; opt.dataset.gst = newItem.gst;
                opt.textContent = newItem.name + ' — ₹' + newItem.rate.toLocaleString('en-IN');
                sel.appendChild(opt); sel.value = newItem.id;
              }
              updateItemRow(sel);
            }
          }
        }

        showNotification('✅ "' + name + '" created & added to voucher!', 'success');
      };

      async function callClaudeAI(userMessage) {
        const co = AppData.companies[AppData.currentCompany];
        const totalSales = AppData.vouchers.filter(v=>v.type==='Sales').reduce((s,v)=>s+v.amount,0);
        const totalPurchase = AppData.vouchers.filter(v=>v.type==='Purchase').reduce((s,v)=>s+v.amount,0);
        const totalReceipts = AppData.vouchers.filter(v=>v.type==='Receipt').reduce((s,v)=>s+v.amount,0);
        const totalPayments = AppData.vouchers.filter(v=>v.type==='Payment').reduce((s,v)=>s+v.amount,0);
        const cashBalance = AppData.ledgerAccounts.find(l=>l.name==='Cash')?.openingBal || 0;
        const bankBalance = AppData.ledgerAccounts.filter(l=>l.isBank).reduce((s,l)=>s+l.openingBal,0);
        const debtors = AppData.ledgerAccounts.filter(l=>l.group==='Sundry Debtors');
        const creditors = AppData.ledgerAccounts.filter(l=>l.group==='Sundry Creditors');
        const totalReceivable = debtors.reduce((s,d)=>s+d.openingBal,0);
        const totalPayable = creditors.reduce((s,c)=>s+c.openingBal,0);
        const netProfit = totalSales - totalPurchase - totalPayments;

        const systemPrompt = `Tum FinCore 360 ka AI Accountant ho — ek expert CA (Chartered Accountant) aur business analyst.

Company: ${co.name}
GSTIN: ${co.gstin}
Financial Year: ${co.financialYear}

LIVE BUSINESS DATA:
- Total Sales: ₹${totalSales.toLocaleString('en-IN')}
- Total Purchase: ₹${totalPurchase.toLocaleString('en-IN')}
- Total Receipts: ₹${totalReceipts.toLocaleString('en-IN')}
- Total Payments: ₹${totalPayments.toLocaleString('en-IN')}
- Net Profit: ₹${netProfit.toLocaleString('en-IN')}
- Cash Balance: ₹${cashBalance.toLocaleString('en-IN')}
- Bank Balance: ₹${bankBalance.toLocaleString('en-IN')}
- Total Receivable: ₹${totalReceivable.toLocaleString('en-IN')} (${debtors.length} debtors)
- Total Payable: ₹${totalPayable.toLocaleString('en-IN')} (${creditors.length} creditors)
- Employees: ${AppData.employees.length}
- Total Vouchers: ${AppData.vouchers.length}

Recent Transactions (last 5):
${AppData.vouchers.slice(-5).map(v=>`- ${v.type}: ${v.party} ₹${v.amount.toLocaleString('en-IN')} (${v.date})`).join('\n')}

Ledger Accounts: ${AppData.ledgerAccounts.map(l=>l.name).join(', ')}
Stock Items: ${AppData.stockItems.map(s=>s.name).join(', ')}
Parties (Debtors): ${debtors.map(d=>d.name).join(', ')}
Parties (Creditors): ${creditors.map(c=>c.name).join(', ')}

TUMHARI CAPABILITIES:
1. Business questions ke jawab do (Hindi ya English mein)
2. Agar user voucher/entry banana chahta hai, JSON mein voucherAction return karo
3. Business insights, anomalies, recommendations do
4. GST, TDS ke baare mein advice do
5. Cash flow predictions karo

VOUCHER DETECTION: Agar message mein koi accounting entry hai (jaise "ABC se paisa mila", "rent diya", "sale ki"), toh response ke end mein yeh format mein add karo:
[VOUCHER_ACTION:{"type":"Receipt/Payment/Sales/Purchase/Journal","party":"Party Name","amount":50000,"description":"Entry description","narration":"Narration"}]

Format: Short, helpful responses. Tables use karo jab relevant ho. HTML use kar sakte ho formatting ke liye. Hinglish mein baat karo.`;

        const messages = [
          ...AppData.aiChatHistory.slice(-8),
          { role: 'user', content: userMessage }
        ];

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: systemPrompt,
            messages: messages
          })
        });

        if (!response.ok) throw new Error(`API Error: ${response.status}`);
        const data = await response.json();
        const fullText = data.content[0]?.text || 'Kuch hua. Dobara try karein.';

        // Parse voucher action if present
        const voucherMatch = fullText.match(/\[VOUCHER_ACTION:(.*?)\]/s);
        let voucherAction = null;
        let cleanText = fullText.replace(/\[VOUCHER_ACTION:.*?\]/s, '').trim();

        if (voucherMatch) {
          try {
            voucherAction = JSON.parse(voucherMatch[1]);
          } catch(e) {}
        }

        return { text: cleanText, voucherAction };
      }

      // ---- FRAUD DETECTOR ----
      function renderFraudDetector(panel) {
        const vouchers = AppData.vouchers;
        const anomalies = [];

        // Check 1: Unusually large amounts
        if (vouchers.length > 2) {
          const amounts = vouchers.map(v=>v.amount);
          const avg = amounts.reduce((s,a)=>s+a,0)/amounts.length;
          const std = Math.sqrt(amounts.reduce((s,a)=>s+Math.pow(a-avg,2),0)/amounts.length);
          vouchers.forEach(v => {
            if (v.amount > avg + 2.5*std) anomalies.push({ level:'high', msg:`⚠️ Unusually large amount: ${v.voucherNo} — ${formatCurrency(v.amount)} (avg ${formatCurrency(avg)})`, voucher:v });
          });
        }

        // Check 2: Duplicate amounts same day same party
        const seen = {};
        vouchers.forEach(v => {
          const key = `${v.date}_${v.party}_${v.amount}_${v.type}`;
          if (seen[key]) anomalies.push({ level:'high', msg:`🔴 Possible duplicate: ${v.voucherNo} — ${v.type} ${v.party} ${formatCurrency(v.amount)} on ${v.date}`, voucher:v });
          seen[key] = true;
        });

        // Check 3: Round number amounts (fraud indicator)
        vouchers.forEach(v => {
          if (v.amount > 10000 && v.amount % 10000 === 0)
            anomalies.push({ level:'medium', msg:`🟡 Round number: ${v.voucherNo} — ${formatCurrency(v.amount)} (possible estimation)`, voucher:v });
        });

        // Check 4: Weekend transactions
        vouchers.forEach(v => {
          const day = new Date(v.date).getDay();
          if ((day === 0 || day === 6) && v.amount > 50000)
            anomalies.push({ level:'low', msg:`🔵 Weekend transaction: ${v.voucherNo} — ${v.type} ${formatCurrency(v.amount)} on ${v.date}`, voucher:v });
        });

        // Check 5: Credit limit exceeded
        AppData.ledgerAccounts.filter(l=>l.group==='Sundry Debtors'&&l.creditLimit>0).forEach(d => {
          if (d.openingBal > d.creditLimit)
            anomalies.push({ level:'high', msg:`⚠️ Credit limit exceeded: ${d.name} — Balance ${formatCurrency(d.openingBal)} > Limit ${formatCurrency(d.creditLimit)}`, voucher:null });
        });

        const highCount = anomalies.filter(a=>a.level==='high').length;
        const medCount  = anomalies.filter(a=>a.level==='medium').length;
        const lowCount  = anomalies.filter(a=>a.level==='low').length;
        const score = Math.max(0, 100 - highCount*20 - medCount*8 - lowCount*3);

        panel.innerHTML = `
          <h2 style="margin-bottom:20px; display:flex; align-items:center; gap:10px;"><span>🔍</span> AI Fraud Detector</h2>
          <div class="stats-grid">
            <div class="stat-card" style="border-color:${score>=80?'rgba(16,185,129,0.3)':score>=60?'rgba(245,158,11,0.3)':'rgba(244,63,94,0.3)'};">
              <h3>Risk Score</h3>
              <div class="number" style="color:${score>=80?'var(--emerald2)':score>=60?'#fbbf24':'var(--danger)'}; font-size:36px;">${score}/100</div>
              <div class="trend">${score>=80?'✅ Low Risk':score>=60?'⚠️ Medium Risk':'🔴 High Risk'}</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${score}%; background:${score>=80?'var(--emerald2)':score>=60?'#fbbf24':'var(--danger)'}"></div></div>
            </div>
            <div class="stat-card"><h3>🔴 High Risk</h3><div class="number" style="color:var(--danger);">${highCount}</div></div>
            <div class="stat-card"><h3>🟡 Medium Risk</h3><div class="number" style="color:#fbbf24;">${medCount}</div></div>
            <div class="stat-card"><h3>🔵 Low Risk</h3><div class="number" style="color:var(--info);">${lowCount}</div></div>
          </div>
          <div class="feature-card">
            <h3>${anomalies.length === 0 ? '✅ No Anomalies Found' : `⚠️ ${anomalies.length} Anomalies Detected`}</h3>
            ${anomalies.length === 0
              ? `<div style="text-align:center; padding:30px; color:var(--emerald2);">
                  <div style="font-size:48px;">✅</div>
                  <p style="margin-top:12px; font-size:14px;">Saare transactions normal hain. Koi suspicious activity nahi mili!</p>
                </div>`
              : `<div style="display:flex; flex-direction:column; gap:10px;">
                  ${anomalies.map(a => `
                    <div style="padding:14px; border-radius:12px; border-left:4px solid ${a.level==='high'?'var(--danger)':a.level==='medium'?'#fbbf24':'var(--info)'}; background:${a.level==='high'?'rgba(244,63,94,0.06)':a.level==='medium'?'rgba(245,158,11,0.06)':'rgba(6,182,212,0.06)'};">
                      <div style="font-size:13px; color:var(--t1);">${a.msg}</div>
                      ${a.voucher ? `<div style="font-size:11px; color:var(--t3); margin-top:4px;">${a.voucher.narration||''}</div>` : ''}
                    </div>`).join('')}
                </div>`}
            <button class="btn btn-secondary" style="width:auto; margin-top:16px;" onclick="aiAsk('Meri company mein koi fraud ya suspicious activity hai? Analysis karo.')">🤖 AI Deep Analysis</button>
          </div>`;
      }

      function renderAICashFlow(panel) {
        const months = ['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];

        const expData   = AppData.dashboard.monthlyExpenses || Array(12).fill(150000);
        const avgSales  = salesData.reduce((s,v)=>s+v,0)/salesData.length;
        const avgExp    = expData.reduce((s,v)=>s+v,0)/expData.length;
        const growthRate = 0.06;

        // Generate 6-month AI prediction
        const predictions = Array.from({length:6}, (_,i) => ({
          month: ['Apr 26','May 26','Jun 26','Jul 26','Aug 26','Sep 26'][i],
          sales: Math.round(avgSales * (1 + growthRate*(i+1)) * (0.9+Math.random()*0.2)),
          expenses: Math.round(avgExp * (1 + 0.03*(i+1))),
          confidence: Math.round(95 - i*5),
        }));

        panel.innerHTML = `
          <h2 style="margin-bottom:20px; display:flex; align-items:center; gap:10px;"><span>📈</span> AI Cash Flow Prediction</h2>
          <div class="feature-card" style="border-color:rgba(0,212,255,0.2);">

            <div class="table-responsive">

                <thead><tr><th>Month</th><th>Predicted Sales</th><th>Predicted Expenses</th><th>Net Cash Flow</th><th>AI Confidence</th></tr></thead>

                  ${predictions.map(p => {
                    const net = p.sales - p.expenses;
                    return `<tr>
                      <td><strong>${p.month}</strong></td>
                      <td style="color:var(--emerald2);">${formatCurrency(p.sales)}</td>
                      <td style="color:var(--danger);">${formatCurrency(p.expenses)}</td>
                      <td><strong style="color:${net>0?'var(--emerald2)':'var(--danger)'};">${formatCurrency(net)}</strong></td>
                      <td>
                        <div style="display:flex; align-items:center; gap:8px;">
                          <div class="progress-bar" style="flex:1; width:80px;"><div class="progress-fill" style="width:${p.confidence}%"></div></div>
                          <span style="font-size:12px; font-family:var(--mono);">${p.confidence}%</span>
                        </div>
                      </td>
                    </tr>`;}).join('')}
                  <tr style="font-weight:700; background:rgba(0,212,255,0.05); border-top:1px solid var(--b2);">
                    <td>6-Month Total</td>
                    <td style="color:var(--emerald2);">${formatCurrency(predictions.reduce((s,p)=>s+p.sales,0))}</td>
                    <td style="color:var(--danger);">${formatCurrency(predictions.reduce((s,p)=>s+p.expenses,0))}</td>
                    <td><strong>${formatCurrency(predictions.reduce((s,p)=>s+(p.sales-p.expenses),0))}</strong></td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <button class="btn btn-secondary" style="width:auto; margin-top:12px;" onclick="aiAsk('Meri company ka cash flow predict karo agle 6 mahine ke liye aur suggestions do.')">🤖 AI Detailed Analysis</button>
          </div>`;

      // ---- SMART INSIGHTS ----
      function renderSmartInsights(panel) {
        const totalSales = AppData.vouchers.filter(v=>v.type==='Sales').reduce((s,v)=>s+v.amount,0);
        const totalPurch = AppData.vouchers.filter(v=>v.type==='Purchase').reduce((s,v)=>s+v.amount,0);
        const totalPay   = AppData.vouchers.filter(v=>v.type==='Payment').reduce((s,v)=>s+v.amount,0);
        const netProfit  = totalSales - totalPurch - totalPay;
        const margin     = totalSales > 0 ? Math.round((netProfit/totalSales)*100) : 0;
        const receivable = AppData.ledgerAccounts.filter(l=>l.group==='Sundry Debtors').reduce((s,l)=>s+l.openingBal,0);
        const payable    = AppData.ledgerAccounts.filter(l=>l.group==='Sundry Creditors').reduce((s,l)=>s+l.openingBal,0);
        const cashBal    = AppData.ledgerAccounts.find(l=>l.name==='Cash')?.openingBal || 0;
        const bankBal    = AppData.ledgerAccounts.filter(l=>l.isBank).reduce((s,l)=>s+l.openingBal,0);
        const totalCash  = cashBal + bankBal;
        const lowStock   = AppData.stockItems.filter(s=>s.openingStock<=s.minStock).length;

        // Calculate health score
        const scores = {
          profitability: Math.min(100, Math.max(0, margin * 3)),
          liquidity:     Math.min(100, totalCash > payable ? 100 : Math.round(totalCash/payable*100)),
          collections:   Math.min(100, Math.max(0, 100 - Math.round(receivable/Math.max(totalSales,1)*100))),
          inventory:     Math.min(100, Math.max(0, 100 - lowStock*15)),
        };
        const overallScore = Math.round(Object.values(scores).reduce((s,v)=>s+v,0)/4);

        const insights = [];
        if (margin < 10) insights.push({ type:'warning', text:`Profit margin sirf ${margin}% hai — industry average 15-20% hoti hai. Costs reduce karo ya prices badhao.` });
        else if (margin > 25) insights.push({ type:'success', text:`Excellent! ${margin}% profit margin — bahut healthy hai! 🎉` });
        if (receivable > totalSales*0.3) insights.push({ type:'warning', text:`Receivables high hain (${formatCurrency(receivable)}). Collection process improve karo.` });
        if (lowStock > 0) insights.push({ type:'danger', text:`${lowStock} items ka stock low level pe hai. Reorder karo turant!` });
        if (totalCash < payable*0.5) insights.push({ type:'danger', text:`Cash position weak hai. Payables ${formatCurrency(payable)} hain lekin cash sirf ${formatCurrency(totalCash)}.` });
        if (AppData.employees.length > 0 && totalSales > 0) {
          const revenuePerEmp = totalSales / AppData.employees.length;
          insights.push({ type:'info', text:`Revenue per employee: ${formatCurrency(revenuePerEmp)} — benchmark ₹25L+ p.a. hona chahiye.` });
        }

        panel.innerHTML = `
          <h2 style="margin-bottom:20px; display:flex; align-items:center; gap:10px;"><span>💡</span> Smart Business Insights</h2>

          <!-- Health Score -->
          <div class="feature-card" style="border-color:rgba(0,212,255,0.3); background:linear-gradient(135deg, rgba(0,10,30,0.9), rgba(13,20,50,0.9));">
            <div style="text-align:center; padding:20px 0;">
              <div style="font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--t3); margin-bottom:12px;">Overall Business Health</div>
              <div style="font-size:72px; font-weight:800; font-family:var(--mono); background:linear-gradient(135deg,var(--cyan),var(--violet2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1;">${overallScore}</div>
              <div style="font-size:24px; color:var(--t2); margin-top:4px;">/ 100</div>
              <div style="margin-top:16px; font-size:16px; font-weight:700; color:${overallScore>=75?'var(--emerald2)':overallScore>=50?'#fbbf24':'var(--danger)'};">
                ${overallScore>=75?'🚀 Excellent Business!':overallScore>=50?'⚠️ Needs Attention':'🔴 Critical Issues'}
              </div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:16px;">
              ${[['💰 Profitability',scores.profitability],['💧 Liquidity',scores.liquidity],['📥 Collections',scores.collections],['📦 Inventory',scores.inventory]].map(([label,score])=>`
                <div style="padding:12px; background:rgba(255,255,255,0.03); border-radius:12px; border:1px solid var(--b1);">
                  <div style="font-size:12px; color:var(--t3); margin-bottom:6px;">${label}</div>
                  <div style="font-size:18px; font-weight:700; font-family:var(--mono); color:${score>=70?'var(--emerald2)':score>=40?'#fbbf24':'var(--danger)'};">${score}</div>
                  <div class="progress-bar"><div class="progress-fill" style="width:${score}%; background:${score>=70?'var(--emerald2)':score>=40?'#fbbf24':'var(--danger)'}"></div></div>
                </div>`).join('')}
            </div>
          </div>

          <!-- AI Insights -->
          <div class="feature-card">
            <h3>💡 AI Recommendations</h3>
            ${insights.length === 0
              ? `<div style="color:var(--emerald2); text-align:center; padding:20px;">✅ Business sahi chal raha hai! Koi major issue nahi.</div>`
              : `<div style="display:flex; flex-direction:column; gap:10px;">
                  ${insights.map(i=>`
                    <div style="padding:14px 16px; border-radius:12px; display:flex; gap:12px; align-items:flex-start;
                      background:${i.type==='success'?'rgba(16,185,129,0.06)':i.type==='warning'?'rgba(245,158,11,0.06)':i.type==='danger'?'rgba(244,63,94,0.06)':'rgba(6,182,212,0.06)'};
                      border-left:3px solid ${i.type==='success'?'var(--emerald2)':i.type==='warning'?'#fbbf24':i.type==='danger'?'var(--danger)':'var(--info)'};">
                      <span style="font-size:18px; flex-shrink:0;">${i.type==='success'?'✅':i.type==='warning'?'⚠️':i.type==='danger'?'🔴':'ℹ️'}</span>
                      <span style="font-size:13px; color:var(--t1); line-height:1.6;">${i.text}</span>
                    </div>`).join('')}

            <button class="btn btn-secondary" style="width:auto; margin-top:16px;" onclick="aiAsk('Meri company ki business health analyze karo aur detailed recommendations do.')">🤖 Ask AI for Full Analysis</button>
          </div>`;
      }

      window.nativeShareInvoice = function() {
        const { v, co } = getInvoiceData(window.currentInvoiceId);
        if (!v) { showNotification('No invoice found', 'error'); return; }

        const invoiceEl = document.getElementById('invoicePrintArea');
        if (!invoiceEl) { showNotification('Invoice not open', 'error'); return; }

        // Show loading indicator
        const loadDiv = document.createElement('div');
        loadDiv.id = 'shareLoader';
        loadDiv.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;
          display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;`;
        loadDiv.innerHTML = `
          <div style="width:48px;height:48px;border:4px solid rgba(0,212,255,0.2);border-top-color:#00d4ff;
            border-radius:50%;animation:spin 0.8s linear infinite;"></div>
          <div style="color:#e8f0ff;font-family:'Sora',sans-serif;font-size:14px;">
            📤 Preparing invoice to share...
          </div>`;
        document.body.appendChild(loadDiv);

        // Use html2canvas to convert invoice to image
        const html2c = window.html2canvas;
        if (!html2c) {
          document.getElementById('shareLoader')?.remove();
          // Fallback: share as text
          shareAsText(v, co);
          return;
        }

        html2c(invoiceEl, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false
        }).then(canvas => {
          canvas.toBlob(async (blob) => {
            document.getElementById('shareLoader')?.remove();

            if (!blob) { shareAsText(v, co); return; }

            const file = new File([blob], `Invoice_${v.voucherNo}.png`, { type: 'image/png' });
            const shareText = `Invoice ${v.voucherNo} from ${co.name}\nParty: ${v.party}\nAmount: ${formatCurrency(v.amount)}\nDate: ${new Date(v.date).toLocaleDateString('en-IN')}`;

            // Try native share with image file
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              try {
                await navigator.share({
                  title: `Invoice ${v.voucherNo} — ${co.name}`,
                  text: shareText,
                  files: [file]
                });
                showNotification('Invoice shared!', 'success');
              } catch(e) {
                if (e.name !== 'AbortError') {
                  // File share failed, try without file
                  shareTextOnly(v, co, shareText);
                }
              }
            } else if (navigator.share) {
              // Share text only
              shareTextOnly(v, co, shareText);
            } else {
              // Desktop fallback — download image
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `Invoice_${v.voucherNo}.png`;
              a.click();
              URL.revokeObjectURL(url);
              showNotification('Invoice image downloaded!', 'success');
            }
          }, 'image/png');
        }).catch(err => {
          document.getElementById('shareLoader')?.remove();
          console.error('html2canvas error:', err);
          shareAsText(v, co);
        });
      };

      // FIX: Bank Reconciliation functions
      window.calcDifference = function() {
        const bank = parseFloat(document.getElementById('bankStmtBalance')?.value) || 0;
        const booksEl = document.getElementById('booksBalance');
        const books = booksEl ? parseFloat(booksEl.innerText.replace(/[₹,\s]/g,'')) || 0 : 0;
        const diff = bank - books;
        const el = document.getElementById('reconDiff');
        if (el) {
          el.innerText = formatCurrency(Math.abs(diff));
          el.style.color = Math.abs(diff) < 1 ? 'var(--success)' : 'var(--danger)';
        }
      };
      window.updateReconciled = function(cb) {
        showNotification('Entry ' + (cb.checked ? '✅ reconciled' : 'unreconciled'), 'info');
      };
      window.loadBankRecon = function() {
        const bankId = document.getElementById('bankSelect')?.value;
        const bank = AppData.ledgerAccounts.find(l => l.id === bankId);
        if (bank) {
          const booksEl = document.getElementById('booksBalance');
          if (booksEl) booksEl.innerText = formatCurrency(bank.openingBal);
          const stmtEl = document.getElementById('bankStmtBalance');
          if (stmtEl && !stmtEl.value) stmtEl.value = bank.openingBal;
          calcDifference();
        }
        showNotification('Bank data loaded', 'success');
      };

      window.refreshOutstanding = function() {
        AppData.ledgerAccounts.forEach(l => {
          if (l.group === 'Sundry Debtors') {
            const sales = AppData.vouchers.filter(v=>v.partyId===l.id&&v.type==='Sales').reduce((s,v)=>s+v.amount,0);
            const rcpts = AppData.vouchers.filter(v=>v.partyId===l.id&&v.type==='Receipt').reduce((s,v)=>s+v.amount,0);
            l.outstanding = l.openingBal + sales - rcpts;
          }
          if (l.group === 'Sundry Creditors') {
            const purch = AppData.vouchers.filter(v=>v.partyId===l.id&&v.type==='Purchase').reduce((s,v)=>s+v.amount,0);
            const pays  = AppData.vouchers.filter(v=>v.partyId===l.id&&v.type==='Payment').reduce((s,v)=>s+v.amount,0);
