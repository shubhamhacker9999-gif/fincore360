      // FIX: handleCalculation - 3-way calc (Qty×Rate=Amt, Amt÷Qty=Rate)
      window.handleCalculation = function(el, target) {
        const row = el.closest('tr'); if (!row) return;
        const q = parseFloat(row.querySelector('.qty')?.value) || 0;
        const a = parseFloat(row.querySelector('.amt')?.value) || 0;
        const r = parseFloat(row.querySelector('.rate')?.value) || 0;
        if (target === 'rate' && q > 0 && a > 0) {
          row.querySelector('.rate').value = (a / q).toFixed(2);
        } else if (target === 'amount' && q > 0 && r > 0) {
          row.querySelector('.amt').value = (q * r).toFixed(2);
        }
        if (row.closest('#itemRows')) calculateTotals();
        else if (row.closest('#purchaseItemRows')) calculatePurchaseTotals();
      };

      // FIX: calculateTotals - use correct selectors
      window.calculateTotals = function() {
        const rows = document.querySelectorAll('#itemRows tr');
        let tax=0, cgst=0, sgst=0;
        rows.forEach(row => {
          const amt = parseFloat(row.querySelector('.amt')?.value) || 0;
          const sel = row.querySelector('.itemSelect');
          const gst = sel ? parseFloat(sel.options[sel.selectedIndex]?.dataset?.gst || 18) : 18;
          tax += amt; cgst += amt*gst/200; sgst += amt*gst/200;
        });
        const fmt = v => v.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
        ['taxableValue','cgstAmount','sgstAmount','totalAmount'].forEach(id => {
          const el = document.getElementById(id); if (!el) return;
          if (id==='taxableValue') el.value = fmt(tax);
          else if (id==='cgstAmount') el.value = fmt(cgst);
          else if (id==='sgstAmount') el.value = fmt(sgst);
          else if (id==='totalAmount') el.value = fmt(tax+cgst+sgst);
        });
        const igt = document.getElementById('igstAmount');
        if (igt) igt.value = '0.00';
      };

      window.calculatePurchaseTotals = function() {
        const rows = document.querySelectorAll('#purchaseItemRows tr');

        rows.forEach(row => {

        const m = {purchaseTaxableValue:tax,purchaseCGST:cgst,purchaseSGST:sgst,purchaseIGST:0,purchaseTotal:tax+cgst+sgst};
        Object.entries(m).forEach(([id,val]) => { const el=document.getElementById(id); if(el) el.value=fmt(val); });

      // FIX: Trial Balance - real data from vouchers
      window.loadTrialBalance = function() {
        const tbody = document.getElementById('tbBody');
        const debitEl = document.getElementById('tbTotalDebit');
        const creditEl = document.getElementById('tbTotalCredit');
        if (!tbody) return;
        const balances = {};
        AppData.ledgerAccounts.forEach(l => {
          balances[l.name] = { dr: l.balType==='Dr' ? l.openingBal : 0, cr: l.balType==='Cr' ? l.openingBal : 0 };
        });
        AppData.vouchers.forEach(v => {
          const add = (name, dr, cr) => {
            if (!name) return;
            if (!balances[name]) balances[name] = {dr:0,cr:0};
            balances[name].dr += dr; balances[name].cr += cr;
          };
          if (v.type==='Sales')   { add(v.party, 0, v.gstDetails?.taxableValue||v.amount/1.18); }
          if (v.type==='Purchase'){ add(v.party, v.gstDetails?.taxableValue||v.amount/1.18, 0); }
          if (v.type==='Receipt') { add(v.party, 0, v.amount); }
          if (v.type==='Payment') { add(v.party, v.amount, 0); }
        });
        let totDr=0, totCr=0, rows='';
        Object.entries(balances).forEach(([name,b]) => {
          if (b.dr>0||b.cr>0) {
            rows += `<tr><td>${name}</td><td>${b.dr>0?formatCurrency(b.dr):'-'}</td><td>${b.cr>0?formatCurrency(b.cr):'-'}</td></tr>`;

        if (creditEl) creditEl.innerText = formatCurrency(totCr);

      // FIX: P&L real data
      window.loadProfitLoss = function() {
        const expEl = document.getElementById('expensesBody');
        const incEl = document.getElementById('incomeBody');
        if (!expEl||!incEl) return;
        let totExp=0, totInc=0;
        const expGroups={}, incGroups={};
        AppData.ledgerAccounts.forEach(l => {
          const g = AppData.groups.find(x=>x.name===l.group);
          if (!g||!l.openingBal) return;
          if (g.type==='Expenses'){expGroups[l.name]=(expGroups[l.name]||0)+l.openingBal;totExp+=l.openingBal;}
          else if(g.type==='Income'){incGroups[l.name]=(incGroups[l.name]||0)+l.openingBal;totInc+=l.openingBal;}
        });
        AppData.vouchers.forEach(v=>{
          if(v.type==='Sales'){const t=v.gstDetails?.taxableValue||v.amount/1.18;incGroups['Sales Revenue']=(incGroups['Sales Revenue']||0)+t;totInc+=t;}
          else if(v.type==='Purchase'){const t=v.gstDetails?.taxableValue||v.amount/1.18;expGroups['Purchase']=(expGroups['Purchase']||0)+t;totExp+=t;}
          else if(v.type==='Payment'){expGroups[v.party]=(expGroups[v.party]||0)+v.amount;totExp+=v.amount;}
        });
        const netProfit=totInc-totExp;
        let expRows='', incRows='';
        Object.entries(expGroups).forEach(([n,a])=>expRows+=`<tr><td>${n}</td><td style="text-align:right;">${formatCurrency(a)}</td></tr>`);
        Object.entries(incGroups).forEach(([n,a])=>incRows+=`<tr><td>${n}</td><td style="text-align:right;">${formatCurrency(a)}</td></tr>`);
        if(netProfit>0) expRows+=`<tr style="font-weight:bold;color:var(--success);"><td>Net Profit</td><td style="text-align:right;">${formatCurrency(netProfit)}</td></tr>`;
        else incRows+=`<tr style="font-weight:bold;color:var(--danger);"><td>Net Loss</td><td style="text-align:right;">${formatCurrency(Math.abs(netProfit))}</td></tr>`;
        const grand=Math.max(totInc,totExp+Math.max(0,netProfit));
        expRows+=`<tr style="font-weight:bold;background:var(--surface3);"><td>Total</td><td style="text-align:right;">${formatCurrency(grand)}</td></tr>`;
        incRows+=`<tr style="font-weight:bold;background:var(--surface3);"><td>Total</td><td style="text-align:right;">${formatCurrency(grand)}</td></tr>`;
        expEl.innerHTML=expRows; incEl.innerHTML=incRows;
        showNotification('P&L generated! Net '+(netProfit>=0?'Profit':'Loss')+': '+formatCurrency(Math.abs(netProfit)),'success');
      };
